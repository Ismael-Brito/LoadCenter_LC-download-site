<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="./logo_32.ico" type="image/x-icon">

<title>Load Center</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0f1c2e,#1e3a5f);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.container{
    text-align:center;
    background:#14243c;
    padding:50px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    width:400px;
}

h1{
    margin-bottom:10px;
}

p{
    color:#c7d2e1;
}

.imagem img{
    width:150px;
    margin:20px 0;
}

.botao{
    display:inline-block;
    margin-top:25px;
    padding:15px 25px;
    background:#1e88e5;
    color:white;
    text-decoration:none;
    font-weight:bold;
    border-radius:6px;
    transition:0.3s;
}

.botao:hover{
    background:#0d6fd1;
}

.footer{
    margin-top:25px;
    font-size:12px;
    color:#8fa3bf;
}

    .historico{
    margin-top:30px;
    text-align:left;
}

.historico h3{
    margin-bottom:10px;
}

.versao-item{
    background:#0f1c2e;
    padding:10px;
    border-radius:6px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

.versao-item a{
    background:#1e88e5;
    padding:5px 10px;
    border-radius:4px;
    color:white;
    text-decoration:none;
    font-size:12px;
}

.versao-item a:hover{
    background:#0d6fd1;
}

</style>
</head>

<body>

<div class="container">

<h1>Load Center</h1>

<p>Ferramenta automatizada para download das bases Brasindice.</p>

<div class="imagem"><img src="./file.png" alt="Logo"></div>
    
<a class="botao" id="downloadBtn" href="#">
⬇ Baixar Programa
</a>

<div class="footer">
Versão <span id="release"></span> <br>
© 2026 Ismael Brito
</div>

</div>
<div class="historico">
    <h3>Versões anteriores</h3>
    <div id="listaVersoes"></div>
</div>
<script>
fetch("https://api.github.com/repos/Ismael-Brito/LoadCenter_LC-download-site/releases/latest")
  .then(res => res.json())
  .then(data => {

    if(!data || data.length === 0) return;
      
    // versão
    document.getElementById("release").innerText = data[0].tag_name;

    // Botão da Ultima realese
    const ultimo = data[0].assets[0];
    if(ultimo){
        document.getElementById("downloadBtn").href = ultimo.browser_download_url;
    }

    // lista versões antigas
    const lista = document.getElementById("listaVersoes");

    data.slice(1).forEach(release => {
        const asset = release.assets[0];
        if(!asset) return;

        const div = document.createElement("div");
        div.className = "versao-item";

        const dataFormatada = new Date(release.published_at).toLocaleDateString("pt-BR");

        div.innerHTML = `
            <span>
                ${release.tag_name} - ${dataFormatada}
            </span>
            <a href="${asset.browser_download_url}">
                Baixar
            </a>
        `;

        lista.appendChild(div);
    });

  });
</script>

</body>

</html>
